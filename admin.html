<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Survey Admin</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --accent: #1a73e8;
      --accent-dark: #1558b0;
      --green: #188038;
      --green-bg: #e6f4ea;
      --orange: #b06000;
      --orange-bg: #fef7e0;
      --red: #d93025;
      --red-bg: #fce8e6;
      font-family: Inter, Roboto, Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 650;
      letter-spacing: 0;
    }

    button {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      padding: 0 16px;
      background: var(--accent);
      color: #fff;
      font: 600 14px Inter, Roboto, Arial, Helvetica, sans-serif;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    button:hover {
      background: var(--accent-dark);
      box-shadow: 0 2px 6px rgba(26, 115, 232, 0.25);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.68;
      cursor: progress;
      transform: none;
      box-shadow: none;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px;
    }

    .panel {
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(60, 64, 67, 0.12);
      overflow: hidden;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .count {
      color: var(--text);
      text-transform: none;
    }

    .email-list {
      display: grid;
      max-height: 48vh;
      overflow: auto;
    }

    .email-item {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px 16px;
      border: 0;
      border-bottom: 1px solid #edf0f2;
      border-radius: 0;
      background: #fff;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: background 140ms ease;
    }

    .email-item:hover,
    .email-item.active {
      background: #f1f6ff;
      transform: none;
      box-shadow: none;
    }

    .email {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 600;
    }

    .meta {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      align-self: start;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge.true {
      background: var(--green-bg);
      color: var(--green);
    }

    .badge.false {
      background: var(--red-bg);
      color: var(--red);
    }

    .badge.high {
      background: var(--green-bg);
      color: var(--green);
    }

    .badge.medium {
      background: var(--orange-bg);
      color: var(--orange);
    }

    .badge.low {
      background: var(--red-bg);
      color: var(--red);
    }

    .badges {
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: wrap;
    }

    .detail {
      padding: 16px;
    }

    .empty {
      padding: 24px 16px;
      color: var(--muted);
      line-height: 1.5;
    }

    .summary {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #edf0f2;
      color: var(--muted);
      font-size: 14px;
    }

    .summary-row strong {
      min-width: 0;
      overflow-wrap: anywhere;
      color: var(--text);
      font-weight: 650;
      text-align: right;
    }

    pre {
      margin: 0;
      max-height: 58vh;
      overflow: auto;
      border-radius: 8px;
      background: #111827;
      color: #e5e7eb;
      padding: 16px;
      font: 13px/1.55 Consolas, Monaco, "Courier New", monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status {
      padding: 10px 16px 0;
      color: var(--muted);
      font-size: 13px;
      min-height: 26px;
    }

    .status.error {
      color: var(--red);
    }

    @media (min-width: 820px) {
      header {
        padding: 18px 24px;
      }

      .dashboard {
        grid-template-columns: minmax(280px, 36%) 1fr;
        align-items: start;
        padding: 22px;
      }

      .email-list {
        max-height: calc(100vh - 158px);
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Survey Admin</h1>
    <button id="refreshButton" type="button">Refresh</button>
  </header>

  <main class="dashboard">
    <section class="panel" aria-labelledby="emails-title">
      <div class="panel-title">
        <span id="emails-title">Submissions</span>
        <span id="count" class="count">0</span>
      </div>
      <div id="status" class="status" role="status" aria-live="polite"></div>
      <div id="emailList" class="email-list"></div>
    </section>

    <section class="panel" aria-labelledby="details-title">
      <div class="panel-title">
        <span id="details-title">Details</span>
      </div>
      <div id="detailPanel" class="detail">
        <div class="empty">Select an email to view the full submission.</div>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBDqLyABIUvBp1vN6UP2nXXoSb8Qg00IZA",
      authDomain: "fun-project-a04fd.firebaseapp.com",
      projectId: "fun-project-a04fd",
      storageBucket: "fun-project-a04fd.firebasestorage.app",
      messagingSenderId: "337537371852",
      appId: "1:337537371852:web:304cc3f45ba3783b127c69"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const refreshButton = document.querySelector("#refreshButton");
    const emailList = document.querySelector("#emailList");
    const detailPanel = document.querySelector("#detailPanel");
    const countEl = document.querySelector("#count");
    const statusEl = document.querySelector("#status");

    let submissions = [];
    let selectedId = "";

    const setStatus = (message, type = "") => {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
    };

    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[char]));

    const formatDate = (isoString) => {
      if (!isoString) return "Unknown time";
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return isoString;
      return date.toLocaleString();
    };

    const getConfidence = (item) => {
      const confidence = item.detection?.confidence;
      return ["high", "medium", "low"].includes(confidence) ? confidence : "low";
    };

    const renderList = () => {
      countEl.textContent = String(submissions.length);

      if (submissions.length === 0) {
        emailList.innerHTML = '<div class="empty">No submissions found.</div>';
        return;
      }

      emailList.innerHTML = submissions.map((item) => {
        const installedClass = item.installed ? "true" : "false";
        const installedLabel = item.installed ? "Installed" : "Not installed";
        const confidence = getConfidence(item);
        const activeClass = item.id === selectedId ? " active" : "";

        return `
          <button class="email-item${activeClass}" type="button" data-id="${escapeHtml(item.id)}">
            <span class="email">${escapeHtml(item.email || "No email")}</span>
            <span class="badges">
              <span class="badge ${installedClass}">${installedLabel}</span>
              <span class="badge ${escapeHtml(confidence)}">${escapeHtml(confidence)}</span>
            </span>
            <span class="meta">${escapeHtml(formatDate(item.timestamp))}</span>
          </button>
        `;
      }).join("");
    };

    const renderDetail = (item) => {
      if (!item) {
        detailPanel.innerHTML = '<div class="empty">Select an email to view the full submission.</div>';
        return;
      }

      const installedClass = item.installed ? "true" : "false";
      const installedLabel = item.installed ? "Installed" : "Not installed";
      const confidence = getConfidence(item);
      const prettyJson = JSON.stringify(item, null, 2);

      detailPanel.innerHTML = `
        <div class="summary">
          <div class="summary-row"><span>Email</span><strong>${escapeHtml(item.email || "No email")}</strong></div>
          <div class="summary-row"><span>Status</span><span class="badge ${installedClass}">${installedLabel}</span></div>
          <div class="summary-row"><span>Confidence</span><span class="badge ${escapeHtml(confidence)}">${escapeHtml(confidence)}</span></div>
          <div class="summary-row"><span>Detection time</span><strong>${escapeHtml(item.detection?.timeSpentMs ?? "Unknown")} ms</strong></div>
          <div class="summary-row"><span>Method</span><strong>${escapeHtml(item.detection?.method || "Unknown")}</strong></div>
          <div class="summary-row"><span>Timestamp</span><strong>${escapeHtml(formatDate(item.timestamp))}</strong></div>
          <div class="summary-row"><span>Timezone</span><strong>${escapeHtml(item.timezone || "Unknown")}</strong></div>
          <div class="summary-row"><span>Referrer</span><strong>${escapeHtml(item.referrer || "None")}</strong></div>
          <div class="summary-row"><span>Platform</span><strong>${escapeHtml(item.device?.platform || "Unknown")}</strong></div>
          <div class="summary-row"><span>Language</span><strong>${escapeHtml(item.device?.language || "Unknown")}</strong></div>
        </div>
        <pre>${escapeHtml(prettyJson)}</pre>
      `;
    };

    const loadSubmissions = async () => {
      refreshButton.disabled = true;
      setStatus("Loading submissions...");

      try {
        const logsQuery = query(collection(db, "logs"), orderBy("timestamp", "desc"));
        const snapshot = await getDocs(logsQuery);

        submissions = snapshot.docs.map((doc) => ({
          id: doc.id,
          ...doc.data()
        }));

        if (!submissions.some((item) => item.id === selectedId)) {
          selectedId = submissions[0]?.id || "";
        }

        renderList();
        renderDetail(submissions.find((item) => item.id === selectedId));
        setStatus("");
      } catch (error) {
        console.error(error);
        setStatus("Could not load submissions. Check Firebase config, indexes, and rules.", "error");
      } finally {
        refreshButton.disabled = false;
      }
    };

    emailList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-id]");
      if (!button) return;

      selectedId = button.dataset.id;
      renderList();
      renderDetail(submissions.find((item) => item.id === selectedId));
    });

    refreshButton.addEventListener("click", loadSubmissions);

    loadSubmissions();
  </script>
</body>
</html>
